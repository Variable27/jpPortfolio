<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38e1c4"/>
      <stop offset="0.55" stop-color="#6c8cff"/>
      <stop offset="1" stop-color="#b06cff"/>
    </linearGradient>
    <linearGradient id="gradText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e1c4"/>
      <stop offset="0.55" stop-color="#6c8cff"/>
      <stop offset="1" stop-color="#b06cff"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="0.12" cy="0.1" r="0.5">
      <stop offset="0" stop-color="#38e1c4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38e1c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0.9" cy="0.15" r="0.55">
      <stop offset="0" stop-color="#b06cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#b06cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 L0 48" fill="none" stroke="#6c8cff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e17"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glowTeal)"/>
  <rect width="1200" height="630" fill="url(#glowViolet)"/>

  <!-- accent border -->
  <rect x="6" y="6" width="1188" height="618" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Brand mark (top-left) -->
  <rect x="80" y="74" width="68" height="68" rx="16" fill="url(#grad)"/>
  <text x="114" y="121" font-family="Arial" font-weight="700" font-size="34" fill="#06121a" text-anchor="middle">JP</text>
  <text x="166" y="120" font-family="Arial" font-weight="700" font-size="30" fill="#e8edf6">Bantillo</text>

  <!-- Availability pill -->
  <g>
    <rect x="80" y="200" width="300" height="46" rx="23" fill="#38e1c4" fill-opacity="0.08" stroke="#38e1c4" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="108" cy="223" r="6" fill="#38e1c4"/>
    <text x="126" y="230" font-family="Arial" font-weight="400" font-size="20" fill="#38e1c4">Available for opportunities</text>
  </g>

  <!-- Name -->
  <text x="78" y="345" font-family="Arial" font-weight="700" font-size="92" fill="#e8edf6">John Paul</text>
  <text x="78" y="445" font-family="Arial" font-weight="700" font-size="92" fill="url(#gradText)">Bantillo</text>

  <!-- Role line -->
  <text x="82" y="505" font-family="Arial" font-weight="400" font-size="30" fill="#93a1bd">Web &amp; Mobile Developer  ·  SEO  ·  Augmented Reality</text>

  <!-- Bottom meta -->
  <text x="82" y="565" font-family="Arial" font-weight="700" font-size="22" fill="#38e1c4">IT Graduate — Cum Laude</text>
  <text x="372" y="565" font-family="Arial" font-weight="400" font-size="22" fill="#64748b">Iloilo, Philippines</text>

  <!-- Right-side code accent -->
  <g transform="translate(820,150)" opacity="0.95">
    <rect x="0" y="0" width="300" height="330" rx="18" fill="#111827" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
    <rect x="0" y="0" width="300" height="44" rx="18" fill="#161f30"/>
    <rect x="0" y="22" width="300" height="22" fill="#161f30"/>
    <circle cx="26" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="48" cy="22" r="6" fill="#febc2e"/>
    <circle cx="70" cy="22" r="6" fill="#28c840"/>
    <text x="100" y="28" font-family="Consolas, monospace" font-size="14" fill="#64748b">developer.js</text>

    <text x="24" y="86"  font-family="Consolas, monospace" font-size="17" fill="#b06cff">const <tspan fill="#38e1c4">dev</tspan> <tspan fill="#e8edf6">= {</tspan></text>
    <text x="44" y="120" font-family="Consolas, monospace" font-size="17" fill="#6c8cff">role<tspan fill="#e8edf6">: </tspan><tspan fill="#f7c984">'Developer'</tspan><tspan fill="#e8edf6">,</tspan></text>
    <text x="44" y="154" font-family="Consolas, monospace" font-size="17" fill="#6c8cff">honor<tspan fill="#e8edf6">: </tspan><tspan fill="#f7c984">'Cum Laude'</tspan><tspan fill="#e8edf6">,</tspan></text>
    <text x="44" y="188" font-family="Consolas, monospace" font-size="17" fill="#6c8cff">stack<tspan fill="#e8edf6">: [</tspan><tspan fill="#f7c984">'JS'</tspan><tspan fill="#e8edf6">,</tspan><tspan fill="#f7c984"> 'PHP'</tspan><tspan fill="#e8edf6">],</tspan></text>
    <text x="44" y="222" font-family="Consolas, monospace" font-size="17" fill="#6c8cff">focus<tspan fill="#e8edf6">: [</tspan><tspan fill="#f7c984">'Web'</tspan><tspan fill="#e8edf6">,</tspan><tspan fill="#f7c984"> 'AR'</tspan><tspan fill="#e8edf6">],</tspan></text>
    <text x="44" y="256" font-family="Consolas, monospace" font-size="17" fill="#6c8cff">open<tspan fill="#e8edf6">: </tspan><tspan fill="#ff7a90">true</tspan></text>
    <text x="24" y="290" font-family="Consolas, monospace" font-size="17" fill="#e8edf6">};</text>
  </g>
</svg>
