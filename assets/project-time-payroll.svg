<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Employee Time Tracking and Payroll preview</title>
  <desc id="desc">Payroll dashboard mockup with timesheets, billable hours, overtime, and payroll summary.</desc>
