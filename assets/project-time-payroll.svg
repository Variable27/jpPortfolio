  <text x="708" y="191" fill="#74529d" font-family="Arial, sans-serif" font-size="15" font-weight="700">Payroll Total</text>
  <text x="708" y="225" fill="#6d28d9" font-family="Arial, sans-serif" font-size="30" font-weight="800">$8.4K</text>
